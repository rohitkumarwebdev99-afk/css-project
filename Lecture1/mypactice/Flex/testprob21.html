
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .flex-container{
        display:flex;
        flex-wrap: nowrap;
        background-color: #8ffcc9;
        width:400px;
    }
    .flex-container>div{
        background-color: white;
        width:40px;
        margin: 5px;
        text-align: center;
        line-height:50px;
        font-size:30px;
    }
    </style>
</head>
<body>
    <div class="flex-container">
        <div>1</div>
        <div>2</div>
        <div style="flex-grow: 3;">3</div>
        <!-- it will take all the space left in the container as it is only growing by taking that space-->
        <div>4</div>
        <div>5</div>
        <div style="flex-shrink:2;">6</div>
        <!-- shrink will not work as the container much big space left if container hight is decrease it will work -->
        <div>7</div>
    </div>
    
</body>
</html>
